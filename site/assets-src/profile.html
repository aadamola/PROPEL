<!doctype html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0}
body{width:1080px;height:1080px;display:flex;align-items:center;justify-content:center;
background:radial-gradient(700px 700px at 30% 20%, #0e2a58, #081c3a 70%);
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;overflow:hidden}
.mark{text-align:center}
.arrow{width:0;height:0;border-left:95px solid transparent;border-right:95px solid transparent;
border-bottom:150px solid #00e57a;margin:0 auto 40px}
.word{color:#fff;font-size:190px;font-weight:900;letter-spacing:14px;line-height:1}
.word span{color:#00e57a}
.tag{color:#b8c4d9;font-size:44px;letter-spacing:10px;margin-top:34px;font-weight:600}
</style></head><body>
<div class="mark">
  <div class="arrow"></div>
  <div class="word">PRO<span>PEL</span></div>
  <div class="tag">WE MOVE PROPERTY</div>
</div>
</body></html>
